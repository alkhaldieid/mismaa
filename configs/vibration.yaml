# Mismaa Phase 4 — vibration fault-diagnosis configuration.
#
# Single source of truth for the CWRU bearing pipeline. Bearing geometry lives
# here (not hard-coded in the code) so the fault-frequency formulas in
# models/vibration/faults.py stay pure. Signal front-end parameters (envelope
# resonance band, sample rate) are cross-checked against configs/dsp.yaml.

data:
  root: data/cwru            # data/cwru/*.mat drive-end bearing records.
  sample_rate: 12000         # 12 kHz drive-end dataset (matches configs/dsp.yaml).
  channel: DE                # drive-end accelerometer.

# SKF 6205-2RS JEM deep-groove ball bearing (the CWRU drive-end bearing).
# Values are the manufacturer geometry; with theta=0 they yield the documented
# CWRU multipliers BPFO=3.5848, BPFI=5.4152, BSF=2.3568, FTF=0.3983 (x shaft Hz).
bearing:
  n_balls: 9
  ball_diameter: 0.3126      # inches
  pitch_diameter: 1.537      # inches
  contact_angle_deg: 0.0     # deep-groove radial bearing.

segment:
  # Both models share one segmentation for a fair 4-class comparison. 2048 samples
  # at 12 kHz = ~171 ms, long enough to span several shaft revolutions (~30 Hz ->
  # ~33 ms), 50% overlap for more training segments without excessive correlation.
  length: 2048
  overlap: 0.5               # -> hop = 1024 samples.

features:
  # Envelope-spectrum band energies around the theoretical fault frequencies.
  # NOTE: at 2048 samples the envelope spectrum bin spacing is 12000/2048 ~= 5.86 Hz,
  # so each fault band spans only a few bins; band_halfwidth_hz widens the
  # integration window to tolerate RPM drift and off-bin peaks.
  n_harmonics: 3             # integrate energy at 1x..3x each fault frequency.
  band_halfwidth_hz: 15.0    # +/- window (Hz) summed around each harmonic (~+/-2-3 bins).
  # Resonance band isolated before the Hilbert envelope. Mirrors
  # configs/dsp.yaml vibration.envelope.bandpass; kept here so the vibration
  # pipeline is configurable independently.
  resonance_band_low_hz: 500.0
  resonance_band_high_hz: 5000.0
  bandpass_order: 4

split:
  # Generalisation-across-load split: train on motor loads 0,1,2 (HP), test on the
  # unseen load 3. Harder and more honest than a random segment split because
  # segments from one file are highly self-similar -- a random split leaks
  # near-duplicate neighbours into test and inflates accuracy. Holding out a whole
  # operating condition (load/speed) tests whether the model learned the fault
  # signature rather than the operating point.
  train_loads: [0, 1, 2]
  test_load: 3

gradient_boosting:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: 3
  subsample: 0.8
  seed: 1234

cnn:
  seed: 1234
  device: auto               # auto -> mps if available else cpu; or cpu | mps.
  lr: 0.001
  batch_size: 128
  epochs: 30
  base_channels: 16
  dropout: 0.3
  weight_decay: 0.0001
  val_fraction: 0.1          # slice of TRAIN segments held out to watch loss.
